# The MCP servers. The AGENT runs locally (your Claude Code) and connects to
# these over HTTP (see .mcp.json → localhost:8101/8102).
#
#   docker compose up -d     # cdp-mcp + uniswap-tx-builder-mcp come up
#   # then ask your local Claude (reads CLAUDE.md): "Poll my YummyBait signals and act."
#
# IMPORTANT: apply the CDP Wallet Policy to your project FIRST — see README
# "Apply the CDP policy". The wallet is only as safe as that policy.

services:
  # Coinbase wallet MCP (stdio) exposed over HTTP/SSE via mcp-proxy.
  cdp-mcp:
    build:
      context: .
      dockerfile: cdp-mcp.Dockerfile
    env_file: .env # CDP_API_KEY_ID / _SECRET / CDP_WALLET_SECRET
    ports:
      - "8101:8101"
    restart: unless-stopped

  # Keyless Uniswap tx builder MCP — https://github.com/Yummybait-fin/uniswap-tx-builder-mcp
  # Published image, native streamable HTTP on /mcp. Pin an exact tag in production
  # (SECURITY.md) instead of :latest.
  uniswap-tx-builder-mcp:
    image: ghcr.io/yummybait-fin/uniswap-tx-builder-mcp:latest
    environment:
      MCP_HTTP_PORT: "8102"
    ports:
      - "8102:8102"
    restart: unless-stopped
